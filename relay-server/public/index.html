<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebTerm 中继控制台</title>
  <!-- Google Fonts: Outfit -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Xterm.js Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/css/xterm.css" />
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #020617 100%);
      --glass-bg: rgba(15, 23, 42, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --accent-purple: #a855f7;
      --accent-pink: #ec4899;
      --accent-gradient: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success-green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    /* 背景装饰光晕 */
    .bg-glow-1 {
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, rgba(0,0,0,0) 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
      z-index: 0;
    }
    .bg-glow-2 {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.1) 0%, rgba(0,0,0,0) 70%);
      bottom: -150px;
      right: -150px;
      pointer-events: none;
      z-index: 0;
    }

    /* 统一的磨砂玻璃卡片 */
    .glass-card {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      width: 100%;
      max-width: 450px;
      padding: 40px;
      z-index: 10;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .hidden {
      display: none !important;
      opacity: 0;
      transform: scale(0.95);
    }

    /* 头部 Title */
    .brand {
      text-align: center;
      margin-bottom: 30px;
    }
    .brand h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .brand p {
      font-size: 0.95rem;
      color: var(--text-muted);
    }

    /* 表单组件 */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .form-group input:focus {
      border-color: var(--accent-purple);
    }

    /* 酷炫按钮 */
    .btn-gradient {
      width: 100%;
      padding: 14px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-gradient:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
    }
    .btn-gradient:active {
      transform: translateY(0);
    }

    /* 设备列表 */
    .device-list {
      margin-top: 15px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .device-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      background: rgba(15, 23, 42, 0.45);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      transition: all 0.3s;
    }
    .device-item:hover {
      border-color: var(--accent-purple);
      background: rgba(15, 23, 42, 0.6);
    }
    .device-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--success-green);
      box-shadow: 0 0 8px var(--success-green);
      animation: pulse 2s infinite;
    }
    .device-name {
      font-weight: 600;
      font-size: 1.05rem;
    }
    .btn-connect {
      padding: 8px 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-connect:hover {
      background: var(--accent-gradient);
      border-color: transparent;
      box-shadow: 0 2px 10px rgba(168, 85, 247, 0.3);
    }

    /* 等待配对弹窗/蒙版 */
    .pairing-box {
      text-align: center;
    }
    .loader-ring {
      display: inline-block;
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--accent-purple);
      animation: spin 1s ease-in-out infinite;
      margin-bottom: 20px;
    }

    /* 大控制台容器 */
    .console-layout {
      display: flex;
      width: 95vw;
      height: 90vh;
      max-width: 1400px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      overflow: hidden;
      z-index: 10;
    }

    /* 左侧边栏 */
    .sidebar {
      width: 320px;
      border-right: 1px solid var(--glass-border);
      display: flex;
      flex-direction: column;
      background: rgba(15, 23, 42, 0.3);
    }
    .sidebar-header {
      padding: 24px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sidebar-header h2 {
      font-size: 1.25rem;
      font-weight: 600;
    }
    .btn-new-session {
      padding: 8px 12px;
      background: var(--accent-gradient);
      border: none;
      border-radius: 8px;
      color: var(--text-main);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .session-item {
      padding: 14px 16px;
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid transparent;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s;
    }
    .session-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .session-item.active {
      background: rgba(168, 85, 247, 0.12);
      border-color: rgba(168, 85, 247, 0.3);
    }
    .session-name {
      font-weight: 500;
      font-size: 0.95rem;
    }
    .session-close-btn {
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1.1rem;
      border: none;
      background: none;
      padding: 4px;
      transition: color 0.2s;
    }
    .session-close-btn:hover {
      color: #ef4444;
    }
    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .btn-disconnect-device {
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
    }

    /* 右侧主视窗 */
    .main-viewport {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(2, 6, 23, 0.4);
    }
    .viewport-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .terminal-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .active-session-indicator {
      color: var(--text-main);
      font-weight: 700;
    }
    .terminal-container {
      flex: 1;
      padding: 16px;
      position: relative;
      background: #000;
      min-height: 200px;
    }
    .xterm {
      height: 100%;
    }
    .xterm-viewport {
      overflow-y: auto;
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      padding: 16px 24px;
      background: #ef4444;
      color: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
      z-index: 100;
      font-weight: 600;
      transition: opacity 0.3s;
    }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .console-layout {
        flex-direction: column;
        height: 98vh;
      }
      .sidebar {
        width: 100%;
        height: 250px;
        border-right: none;
        border-bottom: 1px solid var(--glass-border);
      }
    }
  </style>
</head>
<body>
  <div class="bg-glow-1"></div>
  <div class="bg-glow-2"></div>

  <!-- 1. 登录面板 -->
  <div id="login-card" class="glass-card">
    <div class="brand">
      <h1>WebTerm Relay</h1>
      <p>安全中继身份认证</p>
    </div>
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" value="admin">
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" value="admin_relay_password" placeholder="请输入中继连接密码">
    </div>
    <button class="btn-gradient" onclick="performAuth()">登 录</button>
  </div>

  <!-- 2. 设备大厅 -->
  <div id="lobby-card" class="glass-card hidden">
    <div class="brand">
      <h1>在线设备大厅</h1>
      <p>选择要配对的本地 PC 端</p>
    </div>
    <div class="device-list" id="device-list">
      <!-- 动态加载 -->
      <div style="text-align:center; color:var(--text-muted)">正在获取设备...</div>
    </div>
  </div>

  <!-- 3. 等待配对面板 -->
  <div id="pairing-card" class="glass-card hidden">
    <div class="pairing-box">
      <div class="loader-ring"></div>
      <h2>等待 PC 端授权确认</h2>
      <p style="color: var(--text-muted); margin-top: 10px; font-size: 0.95rem;">
        我们已向该电脑发送了连接申请。<br>请在您的电脑桌面上点击 <b>"Allow" (允许)</b>。
      </p>
      <button class="btn-connect" style="margin-top: 25px; width: 100%;" onclick="cancelPairing()">取 消 连 接</button>
    </div>
  </div>

  <!-- 4. 终极控制中心 -->
  <div id="console-layout" class="console-layout hidden">
    <!-- 左边栏 -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>会话列表</h2>
        <button class="btn-new-session" onclick="promptCreateSession()">+ 新建</button>
      </div>
      <div class="session-list" id="session-list">
        <!-- 动态加载 -->
      </div>
      <div class="sidebar-footer">
        <span id="paired-device-name" style="font-size: 0.85rem; font-weight: 500;">Device</span>
        <button class="btn-disconnect-device" onclick="disconnectDevice()">断开连接</button>
      </div>
    </div>
    <!-- 右侧终端 -->
    <div class="main-viewport">
      <div class="viewport-header">
        <div class="terminal-title">当前会话: <span id="active-session-title" class="active-session-indicator">无</span></div>
        <div id="connection-status" style="font-size: 0.85rem; color: var(--success-green)">● 已连接</div>
      </div>
      <div class="terminal-container" id="terminal-container">
        <!-- xterm 挂载位置 -->
      </div>
    </div>
  </div>

  <!-- 错误通知 Toast -->
  <div id="toast" class="toast hidden"></div>

  <!-- Xterm.js 核心库及 Fit 插件 -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.8.0/lib/addon-fit.js"></script>
  <script>
    // 注册全局错误捕获，把任何 JS 运行时错误直接以 Toast 抛出给用户
    window.onerror = function(message, source, lineno, colno, error) {
      showToast(`JS 错误: ${message} (在 ${source}:${lineno}:${colno})`);
      console.error(error);
      return false;
    };

    let ws = null;
    let term = null;
    let fitAddon = null;
    let currentDeviceId = null;
    let activeSessionId = null;
    let sessionsMap = new Map();

    // 初始化 WebSocket 链接
    function connectWS() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${window.location.host}/ws/relay`;
      
      console.log('Connecting to WS:', wsUrl);
      ws = new WebSocket(wsUrl);
      ws.binaryType = 'arraybuffer';

      ws.onmessage = async (event) => {
        let rawData = event.data;
        if (window.Blob && rawData instanceof window.Blob) {
          try {
            rawData = await rawData.arrayBuffer();
          } catch (e) {
            console.error('Failed to convert Blob to ArrayBuffer:', e);
            return;
          }
        }

        if (rawData instanceof ArrayBuffer) {
          handleBinaryFrame(rawData);
          return;
        }

        let msg;
        try {
          msg = JSON.parse(event.data);
        } catch {
          return;
        }

        console.log('JSON Message Received:', msg.type, msg);

        switch (msg.type) {
          case 'authenticated':
            showCard('lobby-card');
            requestDeviceList();
            break;
          case 'auth-failed':
            showToast('认证失败：密码不正确');
            break;
          case 'devices':
            renderDevices(msg.devices);
            break;
          case 'connect-pending':
            showCard('pairing-card');
            break;
          case 'device-connected':
            showToast('设备成功配对！', true);
            showConsoleLayout();
            break;
          case 'device-rejected':
            showToast(`连接被拒: ${msg.reason || '拒绝'}`);
            showCard('lobby-card');
            requestDeviceList();
            break;
          case 'device-disconnected':
            showToast('PC 代理已断开连接');
            showCard('lobby-card');
            requestDeviceList();
            break;
          case 'sessions':
            renderSessions(msg.sessions);
            break;
          case 'session-created':
            showToast('终端创建成功！', true);
            requestSessionList();
            activateSession(msg.session.id);
            break;
          case 'session-update':
            sessionsMap.set(msg.session.id, msg.session);
            updateSessionListItem(msg.session);
            break;
          case 'session-closed':
            showToast(`会话 ${msg.sessionId} 已关闭`);
            if (activeSessionId === msg.sessionId) {
              activeSessionId = null;
              if (term) {
                term.dispose();
                term = null;
              }
              document.getElementById('active-session-title').innerText = '无';
            }
            requestSessionList();
            break;
          case 'error':
            showToast(`服务器错误: ${msg.message}`);
            break;
        }
      };

      ws.onclose = () => {
        showToast('连接已断开，正在尝试重新连接...');
        showCard('login-card');
        setTimeout(connectWS, 3000);
      };

      ws.onerror = (err) => {
        console.error('WS Error:', err);
        showToast('WebSocket 通信错误，请检查服务器。');
      };
    }

    connectWS();

    // 1. 进行中继登录认证
    function performAuth() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!password) {
        showToast('请输入中继访问密码');
        return;
      }
      sendJSON({ type: 'auth', username, password });
    }

    // 2. 获取设备列表
    function requestDeviceList() {
      sendJSON({ type: 'list-devices' });
    }

    function renderDevices(devices) {
      const listEl = document.getElementById('device-list');
      listEl.innerHTML = '';
      if (devices.length === 0) {
        listEl.innerHTML = '<div style="text-align:center; color:var(--text-muted); padding: 20px;">暂无在线 PC Agent 设备</div>';
        return;
      }
      devices.forEach(dev => {
        const div = document.createElement('div');
        div.className = 'device-item';
        div.innerHTML = `
          <div class="device-info">
            <div class="status-dot"></div>
            <div class="device-name">${escapeHtml(dev.deviceName)}</div>
          </div>
          <button class="btn-connect" onclick="connectDevice('${dev.deviceId}', '${escapeHtml(dev.deviceName)}')">连 接</button>
        `;
        listEl.appendChild(div);
      });
    }

    // 3. 连接特定设备 (触发 PC 弹窗)
    function connectDevice(deviceId, deviceName) {
      currentDeviceId = deviceId;
      document.getElementById('paired-device-name').innerText = deviceName;
      sendJSON({ type: 'connect-device', deviceId });
    }

    function cancelPairing() {
      if (currentDeviceId) {
        sendJSON({ type: 'disconnect-device', deviceId: currentDeviceId });
      }
      showCard('lobby-card');
    }

    function disconnectDevice() {
      if (currentDeviceId) {
        sendJSON({ type: 'disconnect-device', deviceId: currentDeviceId });
      }
      currentDeviceId = null;
      activeSessionId = null;
      if (term) {
        term.dispose();
        term = null;
      }
      showCard('lobby-card');
      requestDeviceList();
    }

    // 4. 控制台布局管理
    function showConsoleLayout() {
      showCard(null); // 隐藏所有常规卡片
      document.getElementById('console-layout').classList.remove('hidden');
      requestSessionList();
    }

    function requestSessionList() {
      sendJSON({ type: 'list-sessions' });
    }

    function renderSessions(sessions) {
      const listEl = document.getElementById('session-list');
      listEl.innerHTML = '';
      sessionsMap.clear();

      sessions.forEach(s => {
        sessionsMap.set(s.id, s);
        const activeClass = s.id === activeSessionId ? 'active' : '';
        const item = document.createElement('div');
        item.className = `session-item ${activeClass}`;
        item.id = `session-item-${s.id}`;
        item.onclick = () => activateSession(s.id);
        item.innerHTML = `
          <span class="session-name" id="session-name-span-${s.id}">${escapeHtml(s.displayTitle || s.name || s.id)}</span>
          <button class="session-close-btn" onclick="event.stopPropagation(); closeSession('${s.id}')">✕</button>
        `;
        listEl.appendChild(item);
      });

      if (sessions.length > 0 && !activeSessionId) {
        activateSession(sessions[0].id);
      }
    }

    function updateSessionListItem(s) {
      const span = document.getElementById(`session-name-span-${s.id}`);
      if (span) {
        span.innerText = s.displayTitle || s.name || s.id;
      }
    }

    function promptCreateSession() {
      const name = prompt('请输入新终端会话名称:', 'Shell');
      if (name) {
        sendJSON({ type: 'create-session', name, cwd: '' });
      }
    }

    function closeSession(sessionId) {
      if (confirm(`确定要关闭并杀死终端会话 ${sessionId} 吗？`)) {
        sendJSON({ type: 'close-session', sessionId });
      }
    }

    // 5. 终端激活及收发
    function activateSession(sessionId) {
      if (activeSessionId !== sessionId) {
        // 切换高亮
        if (activeSessionId) {
          const prev = document.getElementById(`session-item-${activeSessionId}`);
          if (prev) prev.classList.remove('active');
        }
        activeSessionId = sessionId;
        const curr = document.getElementById(`session-item-${sessionId}`);
        if (curr) curr.classList.add('active');
      }

      const s = sessionsMap.get(sessionId);
      document.getElementById('active-session-title').innerText = s ? (s.displayTitle || s.name) : sessionId;

      // 重建 Xterm 视窗
      const container = document.getElementById('terminal-container');
      container.innerHTML = '';

      if (term) {
        term.dispose();
        term = null;
      }

      console.log('Initializing terminal for session:', sessionId);

      term = new window.Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: 'Consolas, "Liberation Mono", Menlo, Courier, monospace',
        theme: {
          background: '#000000',
          foreground: '#f8fafc'
        }
      });

      // 防错实例化 FitAddon 插件（支持 CDN 的各种暴露名）
      try {
        let FitAddonClass = null;
        if (window.FitAddon) {
          FitAddonClass = window.FitAddon.FitAddon || window.FitAddon;
        }
        if (FitAddonClass) {
          fitAddon = new FitAddonClass();
          term.loadAddon(fitAddon);
        } else {
          console.warn('FitAddon constructor not found on window, running without fit addon.');
        }
      } catch (e) {
        console.error('Failed to load FitAddon:', e);
      }

      setTimeout(() => {
        if (!term) return;
        
        term.open(container);

        if (fitAddon) {
          try {
            fitAddon.fit();
          } catch (e) {
            console.warn('fit() call failed:', e);
          }
        }

        // 发送大小调整
        sendResize(term.cols, term.rows);

        // 发送 MSG_HELLO 握手（这会触发 PC 端回传 PTY 快照数据）
        console.log('Sending MSG_HELLO to session:', sessionId);
        sendHello(sessionId);

        // 监听键盘输入并打包发往中继
        term.onData(data => {
          if (ws && ws.readyState === 1 && activeSessionId === sessionId) {
            const inputBytes = new TextEncoder().encode(data);
            const terminalFrame = new Uint8Array(1 + inputBytes.length);
            terminalFrame[0] = 0x01; // MSG_INPUT
            terminalFrame.set(inputBytes, 1);
            
            const frame = encodeRelayFrame(activeSessionId, terminalFrame);
            ws.send(frame);
          }
        });
      }, 50);

      // 窗口拉伸自适应
      window.onresize = () => {
        if (fitAddon && term) {
          try {
            fitAddon.fit();
            sendResize(term.cols, term.rows);
          } catch (e) {
            // ignore
          }
        }
      };
    }

    // 6. 二进制传输核心逻辑
    function handleBinaryFrame(data) {
      const buf = new Uint8Array(data);
      if (buf.length < 2) return;
      const idLen = buf[0];
      if (buf.length < 1 + idLen + 1) return;
      
      const decoder = new TextDecoder('utf-8');
      const sessionId = decoder.decode(buf.subarray(1, 1 + idLen));
      const terminalFrame = buf.subarray(1 + idLen);
      
      const type = terminalFrame[0];
      const payload = terminalFrame.subarray(1);
      
      if (type === 0x02) { // MSG_OUTPUT
        // payload 前 8 字节为 uint64BE seq，后面是真正的文字内容
        const outputBytes = payload.subarray(8);
        if (activeSessionId === sessionId && term) {
          term.write(outputBytes);
        }
      }
    }

    function sendHello(sessionId) {
      const helloPayload = new TextEncoder().encode(JSON.stringify({ lastSeq: 0 }));
      const terminalFrame = new Uint8Array(1 + helloPayload.length);
      terminalFrame[0] = 0x04; // MSG_HELLO
      terminalFrame.set(helloPayload, 1);
      
      const frame = encodeRelayFrame(sessionId, terminalFrame);
      ws.send(frame);
    }

    function sendResize(cols, rows) {
      if (ws && ws.readyState === 1 && activeSessionId) {
        const resizePayload = new TextEncoder().encode(JSON.stringify({ cols, rows }));
        const terminalFrame = new Uint8Array(1 + resizePayload.length);
        terminalFrame[0] = 0x03; // MSG_RESIZE
        terminalFrame.set(resizePayload, 1);
        
        const frame = encodeRelayFrame(activeSessionId, terminalFrame);
        ws.send(frame);
      }
    }

    function encodeRelayFrame(sessionId, terminalFrame) {
      const idBytes = new TextEncoder().encode(sessionId);
      const frame = new Uint8Array(1 + idBytes.length + terminalFrame.length);
      frame[0] = idBytes.length;
      frame.set(idBytes, 1);
      frame.set(terminalFrame, 1 + idBytes.length);
      return frame;
    }

    // 辅助工具
    function sendJSON(obj) {
      if (ws && ws.readyState === 1) {
        ws.send(JSON.stringify(obj));
      }
    }

    function showCard(cardId) {
      document.getElementById('console-layout').classList.add('hidden');
      ['login-card', 'lobby-card', 'pairing-card'].forEach(id => {
        const el = document.getElementById(id);
        if (id === cardId) el.classList.remove('hidden');
        else el.classList.add('hidden');
      });
    }

    function showToast(message, isSuccess = false) {
      const el = document.getElementById('toast');
      el.innerText = message;
      el.style.background = isSuccess ? 'var(--success-green)' : '#ef4444';
      el.style.boxShadow = isSuccess ? '0 4px 15px rgba(16, 185, 129, 0.4)' : '0 4px 15px rgba(239, 68, 68, 0.4)';
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 3500);
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
