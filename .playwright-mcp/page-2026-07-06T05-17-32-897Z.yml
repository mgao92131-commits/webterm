        - paragraph [ref=f2e172]:
          - code [ref=f2e173]: "[[hooks]]"
          - text: 只允许这四个字段，多写会导致配置文件加载失败。
        - paragraph [ref=f2e174]:
          - strong [ref=f2e175]: 同一事件匹配多条规则时
          - text: ，所有命中的 hook 并行运行；
          - code [ref=f2e176]: command
          - text: 完全相同的多条规则只运行一次。
        - paragraph [ref=f2e177]: Hook 命令的工作目录是当前会话的项目目录。非 Windows 平台上，hook 进程放在独立进程组里，超时时先发信号让它有机会善后，之后才强制终止。
        - heading "事件数据格式 Permalink to \"事件数据格式\"" [level=3] [ref=f2e178]:
          - text: 事件数据格式
          - link "Permalink to \"事件数据格式\"" [ref=f2e179] [cursor=pointer]:
            - /url: "#事件数据格式"
            - text: "#"
        - paragraph [ref=f2e180]: 每次触发时，CLI 都会把以下基础信息通过 stdin 传给脚本：
        - generic [ref=f2e181]:
          - button "Copy Code" [ref=f2e182] [cursor=pointer]
          - generic [ref=f2e183]: json
          - code [ref=f2e185]:
            - generic [ref=f2e186]: "{"
            - generic [ref=f2e187]: "\"hook_event_name\": \"PreToolUse\","
            - generic [ref=f2e188]: "\"session_id\": \"session_abc\","
            - generic [ref=f2e189]: "\"cwd\": \"/path/to/project\""
            - generic [ref=f2e190]: "}"
        - paragraph [ref=f2e191]: 具体事件还会附带额外字段（如工具名称、命令内容），见下方事件一览。所有字段名使用下划线命名（snake_case）。
        - heading "返回值 Permalink to \"返回值\"" [level=2] [ref=f2e192]:
