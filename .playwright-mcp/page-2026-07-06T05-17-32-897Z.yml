        - heading "Hooks Permalink to \"Hooks\"" [level=1] [ref=f2e81]:
          - text: Hooks
          - link "Permalink to \"Hooks\"" [ref=f2e82] [cursor=pointer]:
            - /url: "#hooks"
            - text: "#"
        - paragraph [ref=f2e83]: Hooks（钩子）是一种自动触发机制：你预先告诉 Kimi Code CLI"每当发生 X，运行这个脚本"。脚本在你的本机执行，你可以在里面写任何逻辑。典型的使用场景：
        - list [ref=f2e84]:
          - listitem [ref=f2e85]:
            - strong [ref=f2e86]: 安全拦截
            - text: ：Agent 要执行 Shell 命令前，检查是否包含危险操作（如
            - code [ref=f2e87]: rm -rf
            - text: ），包含则阻断执行
          - listitem [ref=f2e88]:
            - strong [ref=f2e89]: 桌面通知
            - text: ：后台任务完成时，弹出系统通知提醒你回来查看结果
          - listitem [ref=f2e90]:
            - strong [ref=f2e91]: 自动检查
            - text: ：每次用户提交消息时，自动在上下文里附加一些背景信息（如当前 Git 分支）
        - heading "Hooks 是怎么工作的 Permalink to \"Hooks 是怎么工作的\"" [level=2] [ref=f2e92]:
          - text: Hooks 是怎么工作的
          - link "Permalink to \"Hooks 是怎么工作的\"" [ref=f2e93] [cursor=pointer]:
            - /url: "#hooks-是怎么工作的"
            - text: "#"
        - paragraph [ref=f2e94]:
          - text: 配置一条 hook 规则，需要指定三件事：
          - strong [ref=f2e95]: 在什么事件上触发
          - text: 、
          - strong [ref=f2e96]: 匹配哪些目标
          - text: 、
          - strong [ref=f2e97]: 运行哪个脚本
          - text: 。
        - paragraph [ref=f2e98]:
          - text: 触发时，CLI 会把事件的详细信息（触发原因、工具名称、命令内容等）打包成 JSON（一种结构化文本格式），通过
          - strong [ref=f2e99]: 标准输入
          - text: （stdin，程序运行时用来接收外部数据的通道）传给你的脚本。脚本读取这些信息后，决定怎么响应。
        - paragraph [ref=f2e100]: 脚本的响应结果由两样东西决定：
        - list [ref=f2e101]:
          - listitem [ref=f2e102]:
            - strong [ref=f2e103]: 退出码
            - text: （exit code，程序结束时向操作系统报告的状态数字）：
            - code [ref=f2e104]: "0"
            - text: 表示放行，
            - code [ref=f2e105]: "2"
            - text: 表示阻断，其他数字默认放行
          - listitem [ref=f2e106]:
            - strong [ref=f2e107]: 标准输出
            - text: （stdout，就是你用
            - code [ref=f2e108]: console.log
            - text: 或
            - code [ref=f2e109]: print
            - text: 打印出来的内容）：可以附带说明文字
        - paragraph [ref=f2e110]:
          - text: 即使脚本报错、超时，CLI 也
          - strong [ref=f2e111]: 不会因此中断你的工作
          - text: ——这种"出错就放行"的设计叫 fail-open（失败开放），避免 hook 异常变成绊脚石。
        - generic [ref=f2e112]:
          - paragraph [ref=f2e113]: 注意
          - paragraph [ref=f2e114]:
            - text: 正因为 fail-open，Hooks 适合做提醒和轻量拦截，但
            - strong [ref=f2e115]: 不应作为唯一的安全防线
            - text: 。对真正高风险的操作，仍需依赖权限审批和人工确认。
        - heading "快速上手：一个最简单的 hook Permalink to \"快速上手：一个最简单的 hook\"" [level=2] [ref=f2e116]:
          - text: 快速上手：一个最简单的 hook
          - link "Permalink to \"快速上手：一个最简单的 hook\"" [ref=f2e117] [cursor=pointer]:
            - /url: "#快速上手-一个最简单的-hook"
            - text: "#"
        - paragraph [ref=f2e118]:
          - text: 下面这条 hook 会在每次后台任务完成时，在终端标题栏闪一下通知（macOS 需要安装
          - code [ref=f2e119]: terminal-notifier
          - text: ）：
        - generic [ref=f2e120]:
          - button "Copy Code" [ref=f2e121] [cursor=pointer]
          - generic [ref=f2e122]: toml
          - code [ref=f2e124]:
            - generic [ref=f2e125]: "# 写在 ~/.kimi-code/config.toml 里"
            - generic [ref=f2e126]: "[[hooks]]"
            - generic [ref=f2e127]: "event = \"Notification\" # 触发时机：后台任务状态变化时"
            - generic [ref=f2e128]: "matcher = \"task\\\\.completed\" # 只关心\"已完成\"的通知"
            - generic [ref=f2e129]: command = "terminal-notifier -title Kimi -message 'Task done'"
        - paragraph [ref=f2e130]: 保存配置、重开会话，下次后台任务完成时就会弹出通知。
        - heading "配置 Permalink to \"配置\"" [level=2] [ref=f2e131]:
          - text: 配置
          - link "Permalink to \"配置\"" [ref=f2e132] [cursor=pointer]:
            - /url: "#配置"
            - text: "#"
