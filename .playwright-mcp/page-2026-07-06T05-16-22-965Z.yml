              - generic [ref=e7557]:
                - text: Agent-based hooks (
                - code [ref=e7558]: "type: \"agent\""
                - text: ) are like prompt-based hooks but with multi-turn tool access. Instead of a single LLM call, an agent hook spawns a subagent that can read files, search code, and inspect the codebase to verify conditions. Agent hooks support the same events as prompt-based hooks.
              - heading "Navigate to header How agent hooks work" [level=3] [ref=e7559]:
                - link "Navigate to header" [ref=e7560] [cursor=pointer]:
                  - /url: "#how-agent-hooks-work"
                  - img [ref=e7562]
                - generic [ref=e7564] [cursor=pointer]: How agent hooks work
              - generic [ref=e7565]: "When an agent hook fires:"
              - list [ref=e7566]:
                - listitem [ref=e7567]: Claude Code spawns a subagent with your prompt and the hook’s JSON input
                - listitem [ref=e7568]: The subagent can use tools like Read, Grep, and Glob to investigate
                - listitem [ref=e7569]:
                  - text: After up to 50 turns, the subagent returns a structured
                  - code [ref=e7570]: "{ \"ok\": true/false }"
                  - text: decision
                - listitem [ref=e7571]: Claude Code processes the decision the same way as a prompt hook
              - generic [ref=e7572]: Agent hooks are useful when verification requires inspecting actual files or test output, not just evaluating the hook input data alone.
              - heading "Navigate to header Agent hook configuration" [level=3] [ref=e7573]:
