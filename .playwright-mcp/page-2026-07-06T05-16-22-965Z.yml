              - heading "Navigate to header Limitations" [level=3] [ref=e7818]:
                - link "Navigate to header" [ref=e7819] [cursor=pointer]:
                  - /url: "#limitations"
                  - img [ref=e7821]
                - generic [ref=e7823] [cursor=pointer]: Limitations
              - generic [ref=e7824]: "Async hooks have several constraints compared to synchronous hooks:"
              - list [ref=e7825]:
                - listitem [ref=e7826]:
                  - text: Only
                  - code [ref=e7827]: "type: \"command\""
                  - text: hooks support
                  - code [ref=e7828]: async
                  - text: . Prompt-based hooks can’t run asynchronously.
                - listitem [ref=e7829]: Async hooks can’t block tool calls or return decisions. By the time the hook completes, the triggering action has already proceeded.
                - listitem [ref=e7830]:
                  - text: "Hook output is delivered on the next conversation turn. If the session is idle, the response waits until the next user interaction. Exception: an"
                  - code [ref=e7831]: asyncRewake
                  - text: hook that exits with code 2 wakes Claude immediately even when the session is idle.
                - listitem [ref=e7832]: Each execution creates a separate background process. There is no deduplication across multiple firings of the same async hook.
              - heading "Navigate to header Security considerations" [level=2] [ref=e7833]:
                - link "Navigate to header" [ref=e7834] [cursor=pointer]:
                  - /url: "#security-considerations"
                  - img [ref=e7836]
                - generic [ref=e7838] [cursor=pointer]: Security considerations
              - heading "Navigate to header Disclaimer" [level=3] [ref=e7839]:
                - link "Navigate to header" [ref=e7840] [cursor=pointer]:
                  - /url: "#disclaimer"
                  - img [ref=e7842]
                - generic [ref=e7844] [cursor=pointer]: Disclaimer
              - generic [ref=e7845]: Command hooks run with your system user’s full permissions.
              - generic [ref=e7846]:
                - img "Warning" [ref=e7848]
                - generic [ref=e7851]: Command hooks execute shell commands with your full user permissions. They can modify, delete, or access any files your user account can access. Review and test all hook commands before adding them to your configuration.
              - heading "Navigate to header Security best practices" [level=3] [ref=e7852]:
                - link "Navigate to header" [ref=e7853] [cursor=pointer]:
                  - /url: "#security-best-practices"
                  - img [ref=e7855]
                - generic [ref=e7857] [cursor=pointer]: Security best practices
              - generic [ref=e7858]: "Keep these practices in mind when writing hooks:"
              - list [ref=e7859]:
                - listitem [ref=e7860]:
                  - strong [ref=e7861]: Validate and sanitize inputs
                  - text: ": never trust input data blindly"
                - listitem [ref=e7862]:
                  - strong [ref=e7863]: Always quote shell variables
                  - text: ": use"
                  - code [ref=e7864]: "\"$VAR\""
                  - text: not
                  - code [ref=e7865]: $VAR
                - listitem [ref=e7866]:
                  - strong [ref=e7867]: Block path traversal
                  - text: ": check for"
                  - code [ref=e7868]: ..
                  - text: in file paths
                - listitem [ref=e7869]:
                  - strong [ref=e7870]: Use absolute paths
                  - text: ": specify full paths for scripts. In exec form, use"
                  - code [ref=e7871]: "${CLAUDE_PROJECT_DIR}"
                  - text: and the path needs no quoting. In shell form, wrap it in double quotes
                - listitem [ref=e7872]:
                  - strong [ref=e7873]: Skip sensitive files
                  - text: ": avoid"
                  - code [ref=e7874]: .env
                  - text: ","
                  - code [ref=e7875]: .git/
                  - text: ", keys, etc."
              - heading "Navigate to header Windows PowerShell tool" [level=2] [ref=e7876]:
                - link "Navigate to header" [ref=e7877] [cursor=pointer]:
                  - /url: "#windows-powershell-tool"
                  - img [ref=e7879]
                - generic [ref=e7881] [cursor=pointer]: Windows PowerShell tool
              - generic [ref=e7882]:
                - text: On Windows, you can run individual hooks in PowerShell by setting
                - code [ref=e7883]: "\"shell\": \"powershell\""
                - text: on a command hook. Hooks spawn PowerShell directly, so this works regardless of whether
                - code [ref=e7884]: CLAUDE_CODE_USE_POWERSHELL_TOOL
                - text: is set. Claude Code auto-detects
                - code [ref=e7885]: pwsh.exe
                - text: ", the PowerShell 7 and later executable, and falls back to"
                - code [ref=e7886]: powershell.exe
                - text: for Windows PowerShell 5.1.
              - generic [ref=e7887]:
                - generic [ref=e7888]:
