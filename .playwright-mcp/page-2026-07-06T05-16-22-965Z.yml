              - heading "Navigate to header Run hooks in the background" [level=2] [ref=e7655]:
                - link "Navigate to header" [ref=e7656] [cursor=pointer]:
                  - /url: "#run-hooks-in-the-background"
                  - img [ref=e7658]
                - generic [ref=e7660] [cursor=pointer]: Run hooks in the background
              - generic [ref=e7661]:
                - text: By default, hooks block Claude’s execution until they complete. For long-running tasks like deployments, test suites, or external API calls, set
                - code [ref=e7662]: "\"async\": true"
                - text: "to run the hook in the background while Claude continues working. Async hooks can’t block or control Claude’s behavior: response fields like"
                - code [ref=e7663]: decision
                - text: ","
                - code [ref=e7664]: permissionDecision
                - text: ", and"
                - code [ref=e7665]: continue
                - text: have no effect, because the action they would have controlled has already completed.
              - heading "Navigate to header Configure an async hook" [level=3] [ref=e7666]:
                - link "Navigate to header" [ref=e7667] [cursor=pointer]:
                  - /url: "#configure-an-async-hook"
                  - img [ref=e7669]
                - generic [ref=e7671] [cursor=pointer]: Configure an async hook
              - generic [ref=e7672]:
                - text: Add
                - code [ref=e7673]: "\"async\": true"
                - text: to a command hook’s configuration to run it in the background without blocking Claude. This field is only available on
                - code [ref=e7674]: "type: \"command\""
                - text: hooks.
              - generic [ref=e7675]:
                - text: This hook runs a test script after every
                - code [ref=e7676]: Write
                - text: tool call. Claude continues working immediately while
                - code [ref=e7677]: run-tests.sh
                - text: "executes for up to 120 seconds. When the script finishes, its output is delivered on the next conversation turn:"
              - generic [ref=e7678]:
                - generic [ref=e7679]:
                  - button "Report incorrect code" [ref=e7681] [cursor=pointer]:
