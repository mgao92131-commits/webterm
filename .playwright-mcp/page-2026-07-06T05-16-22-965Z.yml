                  - generic [ref=e7714]: "}"
              - generic [ref=e7715]:
                - text: The
                - code [ref=e7716]: timeout
                - text: field sets the maximum time in seconds for the background process. If not specified, async hooks use the same 10-minute default as sync hooks.
              - heading "Navigate to header How async hooks execute" [level=3] [ref=e7717]:
                - link "Navigate to header" [ref=e7718] [cursor=pointer]:
                  - /url: "#how-async-hooks-execute"
                  - img [ref=e7720]
                - generic [ref=e7722] [cursor=pointer]: How async hooks execute
              - generic [ref=e7723]: When an async hook fires, Claude Code starts the hook process and immediately continues without waiting for it to finish. The hook receives the same JSON input via stdin as a synchronous hook.
              - generic [ref=e7724]:
                - text: After the background process exits, if the hook produced a JSON response with an
                - code [ref=e7725]: additionalContext
                - text: field, that content is delivered to Claude as context on the next conversation turn. A
                - code [ref=e7726]: systemMessage
                - text: field is shown to you, not to Claude.
              - generic [ref=e7727]:
                - text: Async hook completion notifications are suppressed by default. To see them, enable verbose mode with
                - code [ref=e7728]: Ctrl+O
                - text: or start Claude Code with
                - code [ref=e7729]: "--verbose"
                - text: .
              - heading "Navigate to header Run tests after file changes" [level=3] [ref=e7730]:
                - link "Navigate to header" [ref=e7731] [cursor=pointer]:
                  - /url: "#run-tests-after-file-changes"
                  - img [ref=e7733]
                - generic [ref=e7735] [cursor=pointer]: Run tests after file changes
              - generic [ref=e7736]:
                - text: This hook starts a test suite in the background whenever Claude writes a file, then reports the results back to Claude when the tests finish. Save this script to
                - code [ref=e7737]: .claude/hooks/run-tests-async.sh
                - text: in your project and make it executable with
                - code [ref=e7738]: chmod +x
                - text: ":"
              - generic [ref=e7739]:
                - generic [ref=e7740]:
                  - button "Report incorrect code" [ref=e7742] [cursor=pointer]:
                    - img [ref=e7743]
                  - button "Copy the contents from the code block" [ref=e7746] [cursor=pointer]:
                    - img [ref=e7747]
                  - button "Ask Assistant" [ref=e7751] [cursor=pointer]:
                    - img [ref=e7752]
                - code [ref=e7758]:
                  - generic [ref=e7759]: "#!/bin/bash"
                  - generic [ref=e7760]: "# run-tests-async.sh"
                  - generic [ref=e7761]: "# Read hook input from stdin"
                  - generic [ref=e7762]: INPUT=$(cat)
                  - generic [ref=e7763]: FILE_PATH=$(echo "$INPUT" | jq -r '.tool_input.file_path // empty')
                  - generic [ref=e7764]: "# Only run tests for source files"
                  - generic [ref=e7765]: if [[ "$FILE_PATH" != *.ts && "$FILE_PATH" != *.js ]]; then
                  - generic [ref=e7766]: exit 0
                  - generic [ref=e7767]: fi
                  - generic [ref=e7768]: "# Run tests and report results to Claude via additionalContext"
                  - generic [ref=e7769]: RESULT=$(npm test 2>&1)
                  - generic [ref=e7770]: EXIT_CODE=$?
                  - generic [ref=e7771]: if [ $EXIT_CODE -eq 0 ]; then
                  - generic [ref=e7772]: MSG="Tests passed after editing $FILE_PATH"
                  - generic [ref=e7773]: else
                  - generic [ref=e7774]: "MSG=\"Tests failed after editing $FILE_PATH: $RESULT\""
                  - generic [ref=e7775]: fi
                  - generic [ref=e7776]: "jq -nc --arg msg \"$MSG\" '{hookSpecificOutput: {hookEventName: \"PostToolUse\", additionalContext: $msg}}'"
              - generic [ref=e7777]:
                - text: Then add this configuration to
                - code [ref=e7778]: .claude/settings.json
                - text: in your project root. The
                - code [ref=e7779]: "async: true"
                - text: "flag lets Claude keep working while tests run:"
