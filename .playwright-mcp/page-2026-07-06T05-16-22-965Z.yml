                  - generic [ref=e7703]: "\"hooks\": ["
                  - generic [ref=e7704]: "{"
                  - generic [ref=e7705]: "\"type\": \"command\","
                  - generic [ref=e7706]: "\"command\": \"/path/to/run-tests.sh\","
                  - generic [ref=e7707]: "\"async\": true,"
                  - generic [ref=e7708]: "\"timeout\": 120"
                  - generic [ref=e7709]: "}"
                  - generic [ref=e7710]: "]"
