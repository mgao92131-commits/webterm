              - generic [ref=e2160]: Unlike command hooks, HTTP hooks can’t signal a blocking error through status codes alone. To block a tool call or deny a permission, return a 2xx response with a JSON body containing the appropriate decision fields.
              - heading "Navigate to header JSON output" [level=3] [ref=e2161]:
                - link "Navigate to header" [ref=e2162] [cursor=pointer]:
                  - /url: "#json-output"
                  - img [ref=e2164]
