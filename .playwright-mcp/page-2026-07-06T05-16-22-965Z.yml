                  - generic [ref=e2314]: "# Notification hook: ping the desktop when Claude Code needs attention."
                  - generic [ref=e2315]: input=$(cat)
                  - generic [ref=e2316]: title="Claude Code"
                  - generic [ref=e2317]: body=$(jq -r '.message // "Needs your attention"' <<<"$input")
                  - generic [ref=e2318]: seq=$(printf '\033]777;notify;%s;%s\007' "$title" "$body")
                  - generic [ref=e2319]: "jq -nc --arg seq \"$seq\" '{terminalSequence: $seq}'"
