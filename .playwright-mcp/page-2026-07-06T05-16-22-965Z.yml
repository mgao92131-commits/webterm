              - generic [ref=e2167]:
                - text: Exit codes only let you block or stay silent, but JSON output gives you finer-grained control. Instead of exiting with code 2 to block, exit 0 and print a JSON object to stdout. Claude Code reads specific fields from that JSON to control behavior, including
                - link "decision control" [ref=e2168] [cursor=pointer]:
                  - /url: "#decision-control"
                - text: for blocking, allowing, or escalating to the user.
              - generic [ref=e2169]:
                - img "Note" [ref=e2171]
                - generic [ref=e2174]: "You must choose one approach per hook, not both: either use exit codes alone for signaling, or exit 0 and print JSON for structured control. Claude Code only processes JSON on exit 0. If you exit 2, any JSON is ignored."
              - generic [ref=e2175]:
                - text: Your hook’s stdout must contain only the JSON object. If your shell profile prints text on startup, it can interfere with JSON parsing. See
                - link "JSON validation failed" [ref=e2176] [cursor=pointer]:
                  - /url: /docs/en/hooks-guide#json-validation-failed
                - text: in the troubleshooting guide.
              - generic [ref=e2177]:
                - text: Hook output strings, including
                - code [ref=e2178]: additionalContext
                - text: ","
                - code [ref=e2179]: systemMessage
                - text: ", and plain stdout, are capped at 10,000 characters. Output that exceeds this limit is saved to a file and replaced with a preview and file path, the same way large tool results are handled."
