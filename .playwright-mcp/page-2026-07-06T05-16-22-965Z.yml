              - generic [ref=e1909]: The exit code from your hook command tells Claude Code whether the action should proceed, be blocked, or be ignored.
              - generic [ref=e1910]:
                - strong [ref=e1911]: Exit 0
                - text: means success. Claude Code parses stdout for
                - link "JSON output fields" [ref=e1912] [cursor=pointer]:
                  - /url: "#json-output"
                - text: . JSON output is only processed on exit 0. For most events, stdout is written to the debug log but not shown in the transcript. The exceptions are
                - code [ref=e1913]: UserPromptSubmit
                - text: ","
                - code [ref=e1914]: UserPromptExpansion
                - text: ", and"
                - code [ref=e1915]: SessionStart
                - text: ", where stdout is added as context that Claude can see and act on."
              - generic [ref=e1916]:
                - strong [ref=e1917]: Exit 2
                - text: "means a blocking error. Claude Code ignores stdout and any JSON in it. Instead, stderr text is fed back to Claude as an error message. The effect depends on the event:"
                - code [ref=e1918]: PreToolUse
                - text: blocks the tool call,
                - code [ref=e1919]: UserPromptSubmit
                - text: rejects the prompt, and so on. See
                - link "exit code 2 behavior" [ref=e1920] [cursor=pointer]:
                  - /url: "#exit-code-2-behavior-per-event"
                - text: for the full list.
              - generic [ref=e1921]:
                - strong [ref=e1922]: Any other exit code
                - text: is a non-blocking error for most hook events. The transcript shows a
                - code [ref=e1923]: <hook name> hook error
                - text: notice followed by the first line of stderr, so you can identify the cause without
                - code [ref=e1924]: "--debug"
                - text: . Execution continues and the full stderr is written to the debug log.
              - generic [ref=e1925]: "For example, a hook command script that blocks dangerous Bash commands:"
              - generic [ref=e1926]:
