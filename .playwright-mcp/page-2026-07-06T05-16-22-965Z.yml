                - code [ref=e1945]:
                  - generic [ref=e1946]: "#!/bin/bash"
                  - generic [ref=e1947]: "# Reads JSON input from stdin, checks the command"
                  - generic [ref=e1948]: command=$(jq -r '.tool_input.command' < /dev/stdin)
                  - generic [ref=e1949]: if [[ "$command" == rm* ]]; then
                  - generic [ref=e1950]: "echo \"Blocked: rm commands are not allowed\" >&2"
