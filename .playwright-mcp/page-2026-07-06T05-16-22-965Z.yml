                - text: The
                - code [ref=e2269]: terminalSequence
                - text: field requires Claude Code v2.1.141 or later.
              - generic [ref=e2270]:
                - text: Hooks run without a controlling terminal, so writing escape sequences directly to
                - code [ref=e2271]: /dev/tty
                - text: fails. Instead, return the escape sequence in the
                - code [ref=e2272]: terminalSequence
                - text: field and Claude Code emits it for you through its own terminal write path. This is race-free, works inside tmux and GNU screen, and works on Windows where there is no
                - code [ref=e2273]: /dev/tty
                - text: .
              - generic [ref=e2274]: "The field accepts a string of one or more allowlisted escape sequences:"
              - list [ref=e2275]:
                - listitem [ref=e2276]:
                  - text: OSC
                  - code [ref=e2277]: "0"
                  - text: ","
                  - code [ref=e2278]: "1"
                  - text: ","
                  - code [ref=e2279]: "2"
                  - text: ": window and icon titles"
                - listitem [ref=e2280]:
                  - text: OSC
                  - code [ref=e2281]: "9"
                  - text: ": iTerm2, ConEmu, Windows Terminal, and WezTerm notifications, including"
                  - code [ref=e2282]: 9;4
                  - text: taskbar progress
                - listitem [ref=e2283]:
                  - text: OSC
                  - code [ref=e2284]: "99"
                  - text: ": Kitty notifications"
                - listitem [ref=e2285]:
                  - text: OSC
                  - code [ref=e2286]: "777"
                  - text: ": urxvt, Ghostty, and Warp notifications"
                - listitem [ref=e2287]: Bare BEL
              - generic [ref=e2288]: Sequences may be terminated with BEL or with ST. Anything outside the allowlist, including CSI cursor and color sequences, OSC palette sequences, OSC 8 hyperlinks, OSC 52 clipboard writes, and OSC 1337, is rejected and the field is ignored.
              - generic [ref=e2289]:
                - text: The example below fires a desktop notification from a
                - code [ref=e2290]: Notification
