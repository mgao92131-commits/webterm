                  - generic [ref=e7920]: "]"
                  - generic [ref=e7921]: "}"
                  - generic [ref=e7922]: "}"
              - generic [ref=e7923]:
                - text: To reference the project root from a PowerShell shell-form command, write
                - code [ref=e7924]: "${CLAUDE_PROJECT_DIR}"
                - text: or
                - code [ref=e7925]: $env:CLAUDE_PROJECT_DIR
                - text: . As of v2.1.198, Claude Code rewrites the
                - code [ref=e7926]: "${CLAUDE_PROJECT_DIR}"
                - text: ","
                - code [ref=e7927]: "${CLAUDE_PLUGIN_ROOT}"
                - text: ", and"
                - code [ref=e7928]: "${CLAUDE_PLUGIN_DATA}"
                - text: placeholders in a PowerShell shell-form command to PowerShell’s
                - code [ref=e7929]: "${env:NAME}"
                - text: form, whether the hook is defined in
                - code [ref=e7930]: settings.json
                - text: ", a plugin, or a skill. PowerShell then resolves the value from the exported environment after parsing, so the placeholder works inside double-quoted strings but not inside single-quoted strings, where PowerShell never expands variables."
              - generic [ref=e7931]:
                - text: Before v2.1.198, this rewrite applied only to plugin hooks. On earlier versions, a
                - code [ref=e7932]: settings.json
                - text: hook needs the
                - code [ref=e7933]: "$env:"
                - text: form or
                - link "exec form" [ref=e7934] [cursor=pointer]:
